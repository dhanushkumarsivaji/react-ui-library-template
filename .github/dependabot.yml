version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      storybook:
        patterns:
          - '@storybook/*'
          - 'storybook'
      testing:
        patterns:
          - '@testing-library/*'
          - 'jest*'
      rollup:
        patterns:
          - '@rollup/*'
          - 'rollup*'
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
      babel:
        patterns:
          - '@babel/*'
    labels:
      - dependencies
    reviewers:
      - YOUR_USERNAME

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - ci
